openapi: 3.1.0
info:
  title: Cybernomads Accounts API
  version: 2.0.0
  summary: 账号包装对象管理契约
  description: >
    账号模块 V2 对外契约。账号对象已经重构为系统内部的包装对象，
    创建时不再要求平台 UID 或已完成登录。账号 CRUD 只负责稳定对象本身，
    令牌接入、二维码登录、轮询、验证与日志读取统一由 access session 资源承载。
tags:
  - name: Accounts
    description: 账号包装对象管理
paths:
  /api/accounts:
    post:
      tags: [Accounts]
      summary: 创建账号
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetail'
        '400':
          description: 参数不合法
    get:
      tags: [Accounts]
      summary: 查询账号列表
      operationId: listAccounts
      parameters:
        - $ref: '#/components/parameters/PlatformFilter'
        - $ref: '#/components/parameters/KeywordFilter'
        - $ref: '#/components/parameters/LifecycleStatusFilter'
        - $ref: '#/components/parameters/ConnectionStatusFilter'
        - $ref: '#/components/parameters/AvailabilityStatusFilter'
        - $ref: '#/components/parameters/IncludeDeletedFilter'
        - $ref: '#/components/parameters/OnlyConnectedFilter'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAccountsResponse'
        '400':
          description: 查询参数不合法
  /api/accounts/{accountId}:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    get:
      tags: [Accounts]
      summary: 查询账号详情
      operationId: getAccountDetail
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetail'
        '404':
          description: 账号不存在
    put:
      tags: [Accounts]
      summary: 更新账号资料
      operationId: updateAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetail'
        '400':
          description: 参数不合法
        '404':
          description: 账号不存在
        '409':
          description: 当前状态不允许更新
    delete:
      tags: [Accounts]
      summary: 逻辑删除账号
      operationId: softDeleteAccount
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetail'
        '404':
          description: 账号不存在
  /api/accounts/{accountId}/restore:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    post:
      tags: [Accounts]
      summary: 恢复账号
      operationId: restoreAccount
      responses:
        '200':
          description: 恢复成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetail'
        '404':
          description: 账号不存在
        '409':
          description: 当前状态不允许恢复
components:
  parameters:
    AccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
    PlatformFilter:
      name: platform
      in: query
      schema:
        type: string
    KeywordFilter:
      name: keyword
      in: query
      schema:
        type: string
    LifecycleStatusFilter:
      name: lifecycleStatus
      in: query
      schema:
        $ref: '#/components/schemas/LifecycleStatus'
    ConnectionStatusFilter:
      name: connectionStatus
      in: query
      schema:
        $ref: '#/components/schemas/ConnectionStatus'
    AvailabilityStatusFilter:
      name: availabilityStatus
      in: query
      schema:
        $ref: '#/components/schemas/AvailabilityStatus'
    IncludeDeletedFilter:
      name: includeDeleted
      in: query
      schema:
        type: boolean
    OnlyConnectedFilter:
      name: onlyConnected
      in: query
      schema:
        type: boolean
  schemas:
    LifecycleStatus:
      type: string
      enum: [active, disabled, deleted]
    ConnectionStatus:
      type: string
      enum: [not_logged_in, connecting, connected, connect_failed, expired]
    AvailabilityStatus:
      type: string
      enum: [unknown, healthy, risk, restricted, offline]
    CreateAccountRequest:
      type: object
      required:
        - platform
        - internalDisplayName
      properties:
        platform:
          type: string
        internalDisplayName:
          type: string
        remark:
          type:
            - string
            - 'null'
        tags:
          type: array
          items:
            type: string
          default: []
        platformMetadata:
          type: object
          additionalProperties: true
          default: {}
    UpdateAccountRequest:
      type: object
      required:
        - internalDisplayName
        - remark
        - tags
        - platformMetadata
      properties:
        internalDisplayName:
          type: string
        remark:
          type:
            - string
            - 'null'
        tags:
          type: array
          items:
            type: string
        platformMetadata:
          type: object
          additionalProperties: true
    ResolvedPlatformProfile:
      type: object
      required:
        - resolvedPlatformAccountUid
        - resolvedDisplayName
        - resolvedAvatarUrl
        - resolvedProfileMetadata
      properties:
        resolvedPlatformAccountUid:
          type:
            - string
            - 'null'
        resolvedDisplayName:
          type:
            - string
            - 'null'
        resolvedAvatarUrl:
          type:
            - string
            - 'null'
        resolvedProfileMetadata:
          type: object
          additionalProperties: true
    CurrentCredentialSummary:
      type: object
      required:
        - hasCredential
        - expiresAt
        - updatedAt
      properties:
        hasCredential:
          type: boolean
        expiresAt:
          type:
            - string
            - 'null'
          format: date-time
        updatedAt:
          type:
            - string
            - 'null'
          format: date-time
    CurrentAccessSessionSummary:
      type: object
      required:
        - sessionId
        - accessMode
        - sessionStatus
        - sessionStatusReason
        - challenge
        - hasCandidateCredential
        - credentialApplied
        - hasLogs
        - expiresAt
        - verifiedAt
        - appliedAt
        - createdAt
        - updatedAt
      properties:
        sessionId:
          type: string
        accessMode:
          $ref: '#/components/schemas/AccessMode'
        sessionStatus:
          $ref: '#/components/schemas/AccessSessionStatus'
        sessionStatusReason:
          type:
            - string
            - 'null'
        challenge:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        hasCandidateCredential:
          type: boolean
        credentialApplied:
          type: boolean
        hasLogs:
          type: boolean
        expiresAt:
          type:
            - string
            - 'null'
          format: date-time
        verifiedAt:
          type:
            - string
            - 'null'
          format: date-time
        appliedAt:
          type:
            - string
            - 'null'
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AccountSummary:
      type: object
      required:
        - accountId
        - platform
        - internalDisplayName
        - tags
        - lifecycleStatus
        - connectionStatus
        - availabilityStatus
        - resolvedPlatformProfile
        - hasCurrentCredential
        - updatedAt
      properties:
        accountId:
          type: string
        platform:
          type: string
        internalDisplayName:
          type: string
        tags:
          type: array
          items:
            type: string
        lifecycleStatus:
          $ref: '#/components/schemas/LifecycleStatus'
        connectionStatus:
          $ref: '#/components/schemas/ConnectionStatus'
        availabilityStatus:
          $ref: '#/components/schemas/AvailabilityStatus'
        resolvedPlatformProfile:
          $ref: '#/components/schemas/ResolvedPlatformProfile'
        hasCurrentCredential:
          type: boolean
        updatedAt:
          type: string
          format: date-time
    AccountDetail:
      type: object
      required:
        - accountId
        - platform
        - internalDisplayName
        - remark
        - tags
        - platformMetadata
        - lifecycleStatus
        - connectionStatus
        - connectionStatusReason
        - availabilityStatus
        - availabilityStatusReason
        - resolvedPlatformProfile
        - currentCredential
        - currentAccessSession
        - lastConnectedAt
        - lastVerifiedAt
        - deletedAt
        - createdAt
        - updatedAt
      properties:
        accountId:
          type: string
        platform:
          type: string
        internalDisplayName:
          type: string
        remark:
          type:
            - string
            - 'null'
        tags:
          type: array
          items:
            type: string
        platformMetadata:
          type: object
          additionalProperties: true
        lifecycleStatus:
          $ref: '#/components/schemas/LifecycleStatus'
        connectionStatus:
          $ref: '#/components/schemas/ConnectionStatus'
        connectionStatusReason:
          type:
            - string
            - 'null'
        availabilityStatus:
          $ref: '#/components/schemas/AvailabilityStatus'
        availabilityStatusReason:
          type:
            - string
            - 'null'
        resolvedPlatformProfile:
          $ref: '#/components/schemas/ResolvedPlatformProfile'
        currentCredential:
          $ref: '#/components/schemas/CurrentCredentialSummary'
        currentAccessSession:
          oneOf:
            - $ref: '#/components/schemas/CurrentAccessSessionSummary'
            - type: 'null'
        lastConnectedAt:
          type:
            - string
            - 'null'
          format: date-time
        lastVerifiedAt:
          type:
            - string
            - 'null'
          format: date-time
        deletedAt:
          type:
            - string
            - 'null'
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AccessMode:
      type: string
      enum: [manual_token, qr_login]
    AccessSessionStatus:
      type: string
      enum:
        - waiting_for_scan
        - waiting_for_confirmation
        - ready_for_verification
        - verifying
        - verified
        - verify_failed
        - expired
        - canceled
    ListAccountsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AccountSummary'
